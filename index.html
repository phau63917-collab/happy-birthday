<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Birthday Gift - Galaxy Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #heartCanvas { z-index: 2; } /* Trái tim lớn và tim rơi */
        #bgCanvas { z-index: 1; }    /* Nền vũ trụ sao */
        
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 30; padding: 15px 30px; background: rgba(255, 255, 255, 0.1);
            color: white; border: 2px solid #ff4d6d; cursor: pointer;
            font-size: 20px; border-radius: 50px; transition: 0.4s;
            box-shadow: 0 0 20px #ff4d6d;
        }
        #start-btn:hover { background: #ff4d6d; box-shadow: 0 0 40px #ff4d6d; }

        #text-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; text-align: center; pointer-events: none; display: none;
        }
        .wish { 
            color: #ff4d6d; font-size: 40px; font-weight: bold; 
            text-shadow: 0 0 25px #ff0000; white-space: nowrap;
        }
        .bee { position: absolute; font-size: 25px; z-index: 25; transition: all 2.5s ease-in-out; }
    </style>
</head>
<body>
    <button id="start-btn">คลิกที่นี่</button>
    <div id="text-container">
        <div class="wish">สุขสันต์วันเกิดนะที่รัก</div>
    </div>
    <canvas id="bgCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const textContainer = document.getElementById('text-container');
        
        let hearts = []; 
        let stars = [];
        let mainHeartParticles = [];
        let isStarted = false;

        function init() {
            canvas.width = bgCanvas.width = window.innerWidth;
            canvas.height = bgCanvas.height = window.innerHeight;
            // Tạo sao cho nền vũ trụ
            stars = [];
            for(let i=0; i<400; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random()
                });
            }
        }
        window.addEventListener('resize', init);
        init();

        // Vẽ nền vũ trụ sao lấp lánh
        function drawUniverse() {
            bgCtx.fillStyle = '#050505';
            bgCtx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                bgCtx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                bgCtx.beginPath();
                bgCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                bgCtx.fill();
                s.opacity += (Math.random() - 0.5) * 0.05;
                if(s.opacity < 0) s.opacity = 0;
                if(s.opacity > 1) s.opacity = 1;
            });
            requestAnimationFrame(drawUniverse);
        }
        drawUniverse();

        // Logic Trái tim lớn (Các hạt hội tụ)
        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        class MainHeartParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.t = Math.random() * Math.PI * 2;
                const p = getHeartPoint(this.t);
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.targetX = canvas.width / 2 + p.x * 13;
                this.targetY = canvas.height / 2 + p.y * 13;
                this.speed = Math.random() * 0.04 + 0.01;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                if(Math.abs(this.x - this.targetX) < 1) this.reset();
            }
            draw() {
                ctx.fillStyle = "#ff3366";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const emojis = ['❄️', '💝', '💘', '💖', '💗', '💓', '💞', '💕', '❣️', '❤️'];

        startBtn.onclick = () => {
            isStarted = true;
            startBtn.style.display = 'none';
            textContainer.style.display = 'block';
            
            // Khởi tạo hạt cho trái tim lớn
            for(let i=0; i<600; i++) mainHeartParticles.push(new MainHeartParticle());
            
            // Tạo ong
            for(let i=0; i<10; i++) {
                const bee = document.createElement('div');
                bee.className = 'bee'; bee.innerHTML = '🐝';
                document.body.appendChild(bee);
                const move = () => {
                    bee.style.left = Math.random() * 90 + 'vw';
                    bee.style.top = Math.random() * 90 + 'vh';
                    setTimeout(move, Math.random() * 2000 + 1500);
                };
                move();
            }
            
            setInterval(() => {
                hearts.push({
                    x: Math.random() * canvas.width,
                    y: -50,
                    txt: emojis[Math.floor(Math.random() * emojis.length)],
                    size: Math.random() * 20 + 15,
                    speed: Math.random() * 2 + 2,
                    wind: Math.sin(Math.random()) * 2
                });
            }, 150);
            
            animate();
        };

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vẽ trái tim lớn ở giữa
            mainHeartParticles.forEach(p => { p.update(); p.draw(); });

            // Vẽ tim rơi
            hearts.forEach((h, i) => {
                h.y += h.speed;
                h.x += h.wind;
                ctx.font = h.size + "px Arial";
                ctx.fillText(h.txt, h.x, h.y);
                if (h.y > canvas.height) hearts.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
